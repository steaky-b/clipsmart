<style>
/* ---- ClipSmart brand layer ---- */
:root {
  --cs-bg: #0A0D0A;
  --cs-panel: #16181C;
  --cs-border: #2A2E34;
  --cs-muted: #8B939C;
  --cs-text-soft: #A9B0B8;
  --cs-accent: #2ECC71;
  --cs-accent-soft: #1E2420;
  --cs-accent-muted: #6B7F74;
  --cs-skeleton-base: #1A1D22;
  --cs-skeleton-shine: #24282E;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--cs-bg); }
body { font-family: 'Instrument Sans', sans-serif; }
#root { min-height: 100vh; }

.cs-root { background: var(--cs-bg); color: #ECF2EE; font-family: 'Instrument Sans', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.cs-display { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; letter-spacing: -0.02em; }
.cs-eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--cs-muted); font-weight: 600; }
.cs-page-title { font-size: 1.5rem; line-height: 2rem; }
.cs-section-title { font-size: 1rem; font-weight: 600; color: #ECF2EE; }

.cs-btn-primary { background: var(--cs-accent); color: #06140A; font-weight: 600; letter-spacing: -0.005em; transition: background .15s ease, transform .1s ease; border: none; }
.cs-btn-primary:hover { background: #45DD85; }
.cs-btn-primary:active { transform: scale(0.98); }
.cs-btn-primary:disabled { opacity: .45; cursor: not-allowed; }

.cs-btn-ghost { background: transparent; color: #ECF2EE; border: 1px solid var(--cs-border); transition: border-color .15s ease, background .15s ease; }
.cs-btn-ghost:hover { border-color: var(--cs-accent); background: #141618; }

.cs-btn-danger { background: transparent; color: #E2604F; border: 1px solid #3A2420; transition: background .15s ease; }
.cs-btn-danger:hover { background: #1A0E0D; }

.cs-input { background: var(--cs-bg); border: 1px solid var(--cs-border); color: #ECF2EE; transition: border-color .15s ease, box-shadow .15s ease; }
.cs-input:focus { outline: none; border-color: var(--cs-accent); box-shadow: 0 0 0 3px rgba(46,204,113,0.12); }
.cs-input::placeholder { color: #5C656E; }

.cs-panel { background: var(--cs-panel); border: 1px solid var(--cs-border); }
.cs-row:hover { background: #1A1D22; }

.cs-tab { color: var(--cs-muted); border-bottom: 2px solid transparent; white-space: nowrap; transition: color .15s ease, border-color .15s ease; }
.cs-tab:hover { color: #ECF2EE; }
.cs-tab-active { color: var(--cs-accent) !important; border-bottom: 2px solid var(--cs-accent); }

.cs-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
.cs-scroll::-webkit-scrollbar-thumb { background: var(--cs-border); border-radius: 6px; }

.cs-link { color: var(--cs-accent); text-decoration: none; }
.cs-link:hover { text-decoration: underline; }

.cs-filter-group { background: var(--cs-panel); border: 1px solid var(--cs-border); }
.cs-stat-cell { background: var(--cs-bg); border: 1px solid var(--cs-border); }

/* ---- Analytics dashboard ---- */
.cs-kpi { border-radius: 12px; }
.cs-kpi-label { margin-bottom: 0.5rem; }
.cs-kpi-value { font-variant-numeric: tabular-nums; letter-spacing: -0.03em; }
.cs-kpi-sub { color: var(--cs-muted); font-variant-numeric: tabular-nums; }
.cs-chart-panel { border-radius: 12px; overflow: hidden; }
.cs-chart-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.cs-chart-title { font-size: 0.875rem; font-weight: 600; color: #ECF2EE; }
.cs-chart-subtitle { font-size: 0.75rem; color: var(--cs-muted); margin-top: 0.125rem; }
.cs-chart-legend { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.cs-chart-legend-item { display: inline-flex; align-items: center; gap: 0.375rem; font-size: 0.6875rem; color: var(--cs-muted); font-weight: 500; }
.cs-chart-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cs-chart { width: 100%; height: auto; display: block; }
.cs-chart-empty { display: flex; align-items: center; justify-content: center; min-height: 200px; text-align: center; padding: 2rem; font-size: 0.875rem; color: var(--cs-muted); }
.cs-period-pill { display: inline-flex; align-items: center; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; color: var(--cs-text-soft); background: var(--cs-bg); border: 1px solid var(--cs-border); }
.cs-data-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid var(--cs-border); font-size: 0.875rem; }
.cs-data-row:last-child { border-bottom: none; }
.cs-video-grid { display: grid; gap: 1rem; grid-template-columns: repeat(2, minmax(0, 1fr)); }
@media (min-width: 768px) { .cs-video-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
@media (min-width: 1280px) { .cs-video-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
.cs-top-video-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--cs-border); }
.cs-top-video-row:last-child { border-bottom: none; }

@keyframes cs-shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.cs-skeleton {
  background: linear-gradient(90deg, var(--cs-skeleton-base) 25%, var(--cs-skeleton-shine) 50%, var(--cs-skeleton-base) 75%);
  background-size: 200% 100%;
  animation: cs-shimmer 1.4s ease-in-out infinite;
  border-radius: 8px;
}

button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--cs-accent);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0.001ms !important; animation-duration: 0.001ms !important; }
  .cs-skeleton { animation: none; background: var(--cs-skeleton-base); }
}
</style>
